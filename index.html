<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>かんたん在庫入力</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header>
      <div>
        <p class="eyebrow">スマホ用</p>
        <h1>かんたん在庫入力</h1>
      </div>
      <button id="exportBtn" class="ghost">CSV出力</button>
    </header>

    <section class="card scan-card">
      <label>バーコード</label>
      <div class="row">
        <input id="barcode" type="text" inputmode="numeric" placeholder="読取 or 手入力" />
        <button id="scanBtn">カメラ読取</button>
      </div>
      <div id="cameraBox" class="camera-box" hidden>
        <video id="preview" playsinline muted></video>
        <div class="scan-line"></div>
      </div>
      <div class="row small-row">
        <button id="stopScanBtn" class="ghost" hidden>停止</button>
      </div>
      <p id="cameraHelp" class="help"></p>
    </section>

    <section class="card">
      <label>商品名</label>
      <input id="name" type="text" placeholder="例：コピー用紙 A4" />

      <label>在庫数</label>
      <input id="qty" type="number" inputmode="numeric" placeholder="例：12" />

      <button id="saveBtn" class="primary">保存</button>
      <p id="message" class="message"></p>
    </section>

    <section class="card">
      <div class="section-title">
        <h2>入力済み</h2>
        <button id="clearBtn" class="danger">全削除</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>バーコード</th><th>商品名</th><th>在庫数</th></tr>
          </thead>
          <tbody id="list"></tbody>
        </table>
      </div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
